name: "IoT Sensor Fleet Analytics"
parallelism: 2

steps:
  # ── SOURCE: Data Generator ──────────────────────────────────────────────────
  # Generates 15 messages per second to simulate high-throughput sensor data.
  # Output will be strings like "sensor-0", "sensor-1", etc.
  - type: source
    name: datagen
    properties:
      rowsPerSecond: "15"
      payload: "sensor"

  # ── PROCESS: Telemetry Payload Generation ───────────────────────────────────
  - type: process
    name: simulate-telemetry
    code: |
      String[] parts = input.split("-");
      long index = Long.parseLong(parts[parts.length - 1]);
      
      String[] trucks = {"TRUCK_01", "TRUCK_02", "TRUCK_03"};
      String truckId = trucks[(int)(index % 3)];
      
      // Randomize temperature to spike higher so that average > 0 occurs frequently
      double temp = -18.0 + (Math.random() * 45.0);
      
      com.fasterxml.jackson.databind.ObjectMapper mapper = new com.fasterxml.jackson.databind.ObjectMapper();
      com.fasterxml.jackson.databind.node.ObjectNode payload = mapper.createObjectNode();
      payload.put("truckId", truckId);
      payload.put("temperature", Math.round(temp * 100.0) / 100.0);
      payload.put("timestamp", java.time.Instant.now().toString());
      
      return payload.toString();

  # ── KEYBY: Partition stream by Truck ID ─────────────────────────────────────
  - type: keyby
    name: partition-by-truck
    code: |
      com.fasterxml.jackson.databind.ObjectMapper mapper = new com.fasterxml.jackson.databind.ObjectMapper();
      com.fasterxml.jackson.databind.JsonNode obj = mapper.readTree(input);
      return obj.get("truckId").asText();

  # ── WINDOW REDUCE: 5-Second Tumbling Window ─────────────────────────────────
  - type: window
    name: calculate-average-temp
    properties:
      windowType: "tumbling"
      size: "5"
    code: |
      com.fasterxml.jackson.databind.ObjectMapper mapper = new com.fasterxml.jackson.databind.ObjectMapper();
      com.fasterxml.jackson.databind.JsonNode o1 = mapper.readTree(value1);
      com.fasterxml.jackson.databind.JsonNode o2 = mapper.readTree(value2);
      
      double sum1 = o1.has("sumTemp") ? o1.get("sumTemp").asDouble() : o1.get("temperature").asDouble();
      int count1 = o1.has("count") ? o1.get("count").asInt() : 1;
      
      double sum2 = o2.has("sumTemp") ? o2.get("sumTemp").asDouble() : o2.get("temperature").asDouble();
      int count2 = o2.has("count") ? o2.get("count").asInt() : 1;
      
      double totalSum = sum1 + sum2;
      int totalCount = count1 + count2;
      double avgTemp = Math.round((totalSum / totalCount) * 100.0) / 100.0;
      
      com.fasterxml.jackson.databind.node.ObjectNode result = mapper.createObjectNode();
      result.put("truckId", o1.get("truckId").asText());
      result.put("sumTemp", totalSum);
      result.put("count", totalCount);
      result.put("averageTemperature", avgTemp);
      
      return result.toString();

  # ── PROCESS: Alert Condition Engine ─────────────────────────────────────────
  - type: process
    name: augment-temperature-alerts
    code: |
      com.fasterxml.jackson.databind.ObjectMapper mapper = new com.fasterxml.jackson.databind.ObjectMapper();
      com.fasterxml.jackson.databind.node.ObjectNode obj = (com.fasterxml.jackson.databind.node.ObjectNode) mapper.readTree(input);
      if (obj.get("averageTemperature").asDouble() > 0.0) {
          obj.put("STATUS", "CRITICAL_ALERT");
          obj.put("message", "Refrigeration failure detected! Cargo at risk.");
      } else {
          obj.put("STATUS", "NORMAL");
      }
      return obj.toString();

  # ── FILTER: Keep Only Alerts ────────────────────────────────────────────────
  - type: filter
    name: filter-alerts
    code: |
      com.fasterxml.jackson.databind.ObjectMapper mapper = new com.fasterxml.jackson.databind.ObjectMapper();
      com.fasterxml.jackson.databind.JsonNode obj = mapper.readTree(input);
      return "CRITICAL_ALERT".equals(obj.get("STATUS").asText());

  # ── SINK: Console Output ────────────────────────────────────────────────────
  - type: sink
    name: console-sink
