name: "Real-Time Fraud Evaluation Pipeline"
parallelism: 4

steps:
  # ── SOURCE: Ingest real-time transactions ───────────────────────────────────
  - type: flowlet
    name: confluent-kafka-source
    with:
      bootstrapServers: "pkc-xxx.us-east-1.aws.confluent.cloud:9092"
      topic: "live-transactions"
      apiKey: "${KAFKA_API_KEY}"
      apiSecret: "${KAFKA_API_SECRET}"
      groupId: "fraud-eval-group"

  # ── ACTION: HTTP Enrichment (Async ML Inference) ────────────────────────────
  - type: flowlet
    name: http-enrich
    with:
      urlCode: |
        org.json.JSONObject tx = new org.json.JSONObject(input);
        return "http://internal-fraud-ml-service/score?userId=" + tx.getString("userId") 
               + "&amount=" + tx.getDouble("amount");
      mergeCode: |
        org.json.JSONObject tx = new org.json.JSONObject(input);
        org.json.JSONObject mlResponse = new org.json.JSONObject(response);
        tx.put("fraudScore", mlResponse.getDouble("probability_score"));
        return tx.toString();
      timeout: "1000"      
      capacity: "100"      

  # ── PROCESS: Filter and Alert Logic ─────────────────────────────────────────
  - type: process
    name: filter-high-risk
    code: |
      org.json.JSONObject event = new org.json.JSONObject(input);
      double riskScore = event.getDouble("fraudScore");
      
      if (riskScore > 0.85) {
          event.put("alertTime", java.time.Instant.now().toString());
          return event.toString();
      } else {
          return null; 
      }

  # ── SINK: Route to Alerting Topic ───────────────────────────────────────────
  - type: flowlet
    name: confluent-kafka-sink
    with:
      bootstrapServers: "pkc-xxx.us-east-1.aws.confluent.cloud:9092"
      topic: "high-risk-alerts"
      apiKey: "${KAFKA_API_KEY}"
      apiSecret: "${KAFKA_API_SECRET}"
