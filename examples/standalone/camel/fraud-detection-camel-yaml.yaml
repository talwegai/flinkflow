name: "Fraud Detection Pipeline (Camel YAML DSL)"
parallelism: 1

steps:
  - type: source
    name: datagen
    properties:
      rowsPerSecond: "2"
      payload: "sensor"

  - type: process
    name: create-transaction
    language: camel
    code: '{"userId": "USER_${random(100,999)}", "amount": ${random(10,5000)}, "location": "NYC"}'

  - type: process
    name: simulate-fraud-score
    language: camel-yaml
    code: |
      - from:
          uri: "direct:start"
          steps:
            - setHeader:
                name: "score"
                simple: "${random(0,100)}"
            - setBody:
                groovy: |
                  def score = (headers.get('score') as Double) / 100.0
                  def bodyMap = new groovy.json.JsonSlurper().parseText(body)
                  bodyMap.fraudScore = score
                  return groovy.json.JsonOutput.toJson(bodyMap)
            - to: "log:enriched?showHeaders=true"

  - type: process
    name: high-risk-filter
    language: camel-yaml
    code: |
      - from:
          uri: "direct:start"
          steps:
            - unmarshal:
                json: {}
            - choice:
                when:
                  - simple: "${body[fraudScore]} > 0.85"
                    steps:
                      - setBody:
                          simple: |
                            {
                              "alert": "FRAUD_DETECTED",
                              "userId": "${body[userId]}",
                              "amount": ${body[amount]},
                              "fraudScore": ${body[fraudScore]},
                              "timestamp": "${date:now:yyyy-MM-dd'T'HH:mm:ssZZ}"
                            }
                otherwise:
                  steps:
                    - setBody:
                        constant: "No potential fraud detected"
            - to: "log:filter-result"

  - type: sink
    name: console-sink
