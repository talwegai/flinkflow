name: "Real-Time Fraud Evaluation Pipeline"
parallelism: 4

# Generic flowlet fraud pipeline — language injected via --lang
# Usage:
#   ./scripts/run-local.sh examples/standalone/pipelineYaml/fraud-detection-flowlets.yaml --lang java
#   ./scripts/run-local.sh examples/standalone/pipelineYaml/fraud-detection-flowlets.yaml --lang python
#   ./scripts/run-local.sh examples/standalone/pipelineYaml/fraud-detection-flowlets.yaml --lang camel-groovy
#   ./scripts/run-local.sh examples/standalone/pipelineYaml/fraud-detection-flowlets.yaml --lang camel

steps:
  - type: flowlet
    name: confluent-kafka-source
    with:
      bootstrapServers: "pkc-xxx.us-east-1.aws.confluent.cloud:9092"
      topic: "live-transactions"
      apiKey: "${KAFKA_API_KEY}"
      apiSecret: "${KAFKA_API_SECRET}"
      groupId: "fraud-eval-group"

  - type: flowlet
    name: http-enrich
    with:
      language: "${lang}"
      urlCode: "file:snippets/${lang}/fraud-flowlet-url.${ext}"
      mergeCode: "file:snippets/${lang}/fraud-flowlet-merge.${ext}"
      timeout: "1000"
      capacity: "100"

  - type: process
    name: filter-high-risk
    language: "${lang}"
    code: "file:snippets/${lang}/fraud-filter-high-risk.${ext}"

  - type: flowlet
    name: confluent-kafka-sink
    with:
      bootstrapServers: "pkc-xxx.us-east-1.aws.confluent.cloud:9092"
      topic: "high-risk-alerts"
      apiKey: "${KAFKA_API_KEY}"
      apiSecret: "${KAFKA_API_SECRET}"
