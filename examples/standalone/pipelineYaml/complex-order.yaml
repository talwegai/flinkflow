name: "Complex Order Processing Pipeline"
parallelism: 1

# Generic complex order pipeline — language injected via --lang
# Usage:
#   ./scripts/run-local.sh examples/standalone/pipelineYaml/complex-order.yaml --lang java
#   ./scripts/run-local.sh examples/standalone/pipelineYaml/complex-order.yaml --lang python
#   ./scripts/run-local.sh examples/standalone/pipelineYaml/complex-order.yaml --lang camel-groovy
#   ./scripts/run-local.sh examples/standalone/pipelineYaml/complex-order.yaml --lang camel
#
# 3-step JSON order pipeline:
#   1. filter  — keep only 'delivered' orders
#   2. process — add tax (7%), total, and timestamp
#   3. flatmap — explode items array into individual records

steps:
  - type: source
    name: static-source
    properties:
      content: '{"id":"ORD-1","status":"delivered","amount":100,"items":["apple","banana"]}|{"id":"ORD-2","status":"pending","amount":50,"items":["orange"]}|{"id":"ORD-3","status":"delivered","amount":200,"items":["mango","peach","pear"]}'

  - type: filter
    name: delivered-only
    language: "${lang}"
    code: "file:snippets/${lang}/complex-order-filter.${ext}"

  - type: process
    name: tax-and-timestamp
    language: "${lang}"
    code: "file:snippets/${lang}/complex-order-enrich.${ext}"

  - type: flatmap
    name: explode-items
    language: "${lang}"
    code: "file:snippets/${lang}/complex-order-explode.${ext}"

  - type: sink
    name: console-sink
