apiVersion: v1
kind: ConfigMap
metadata:
  name: flinkflow-pipeline-config
data:
  pipeline.yaml: |
    name: "Flinkflow Cluster Demo"
    parallelism: 2
    steps:
      - type: source
        name: static-source
        properties:
          content: "Cluster,Mode,Activated,Flink,TaskManagers"

      - type: process
        name: transform
        code: |
          return "[CLUSTER] " + input + " processed by " + System.getProperty("user.name");

      - type: sink
        name: console-sink
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-config
data:
  flink-conf.yaml: |+
    jobmanager.rpc.address: flink-jobmanager
    taskmanager.numberOfTaskSlots: 2
    blob.server.port: 6124
    jobmanager.rpc.port: 6123
    taskmanager.rpc.port: 6122
    jobmanager.memory.process.size: 1600m
    taskmanager.memory.process.size: 1728m
    parallelism.default: 2
    # Prometheus Metrics Configuration
    metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    metrics.reporter.prom.port: 9249
  log4j-console.properties: |+
    rootLogger.level = INFO
    rootLogger.appenderRef.console.ref = ConsoleAppender
    appender.console.name = ConsoleAppender
    appender.console.type = Console
    appender.console.layout.type = PatternLayout
    appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %-60c %x - %m%n
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
spec:
  type: ClusterIP
  ports:
  - name: rpc
    port: 6123
  - name: blob-server
    port: 6124
  - name: webui
    port: 8081
  selector:
    app: flink
    component: jobmanager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink
      component: jobmanager
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9249"
      labels:
        app: flink
        component: jobmanager
    spec:
      containers:
      - name: jobmanager
        image: flinkflow:latest
        imagePullPolicy: IfNotPresent
        args: ["jobmanager"]
        ports:
        - containerPort: 6123
          name: rpc
        - containerPort: 6124
          name: blob-server
        - containerPort: 8081
          name: webui
        - containerPort: 9249
          name: metrics
        volumeMounts:
        - name: flink-config-volume
          mountPath: /opt/flink/conf/flink-conf.yaml
          subPath: flink-conf.yaml
        - name: flink-log-volume
          mountPath: /opt/flink/conf/log4j-console.properties
          subPath: log4j-console.properties
        - name: pipeline-config-volume
          mountPath: /opt/flink/conf/pipeline.yaml
          subPath: pipeline.yaml
      volumes:
      - name: flink-config-volume
        configMap:
          name: flink-config
      - name: flink-log-volume
        configMap:
          name: flink-config
      - name: pipeline-config-volume
        configMap:
          name: flinkflow-pipeline-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flink
      component: taskmanager
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9249"
      labels:
        app: flink
        component: taskmanager
    spec:
      containers:
      - name: taskmanager
        image: flinkflow:latest
        imagePullPolicy: IfNotPresent
        args: ["taskmanager"]
        ports:
        - containerPort: 6122
          name: rpc
        - containerPort: 9249
          name: metrics
        volumeMounts:
        - name: flink-config-volume
          mountPath: /opt/flink/conf/flink-conf.yaml
          subPath: flink-conf.yaml
        - name: flink-log-volume
          mountPath: /opt/flink/conf/log4j-console.properties
          subPath: log4j-console.properties
      volumes:
      - name: flink-config-volume
        configMap:
          name: flink-config
      - name: flink-log-volume
        configMap:
          name: flink-config
