---
# ─────────────────────────────────────────────────────────────────────────────
# Flinkflow Pipeline CRD
#
# Allows defining an entire Flink processing job as a Kubernetes resource.
# This makes the job configuration Kubernetes-native, manageable via kubectl
# and GitOps tools.
#
# Apply with:
#   kubectl apply -f k8s/crd-pipeline.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pipelines.flinkflow.io
  labels:
    app.kubernetes.io/name: flinkflow
spec:
  group: flinkflow.io
  names:
    kind: Pipeline
    listKind: PipelineList
    plural: pipelines
    singular: pipeline
    shortNames:
      - pln
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Parallelism
          type: integer
          jsonPath: .spec.parallelism
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - steps
              properties:
                name:
                  type: string
                  description: Optional override for the Flink Job name.
                parallelism:
                  type: integer
                  default: 1
                steps:
                  type: array
                  description: "The sequence of processing steps in the pipeline."
                  items:
                    type: object
                    required:
                      - type
                      - name
                    properties:
                      type:
                        type: string
                        description: "The functional type of the pipeline step."
                        enum:
                          - source
                          - sink
                          - process
                          - transform
                          - filter
                          - flatmap
                          - keyby
                          - groupby
                          - reduce
                          - aggregate
                          - window
                          - sideoutput
                          - join
                          - datamapper
                          - http-lookup
                          - flowlet
                      name:
                        type: string
                        description: "A unique identifier for this step within the pipeline."
                      connector:
                        type: string
                        description: "The name of the infrastructure connector (required for source/sink)."
                      code:
                        type: string
                        description: "Inline logic or transformation snippet."
                      language:
                        type: string
                        description: "The execution runtime for the code snippet."
                        default: java
                        enum:
                          - java
                          - python
                          - camel
                          - camel-yaml
                          - camel-jsonpath
                          - camel-simple
                          - camel-groovy
                      properties:
                        type: object
                        description: "Configuration parameters for the specific step or connector."
                        additionalProperties:
                          type: string
                      with:
                        type: object
                        description: "Parameter values passed to a step of type 'flowlet'."
                        additionalProperties:
                          type: string
