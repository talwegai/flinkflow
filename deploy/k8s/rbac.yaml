apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-service-account
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "delete", "edit"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "delete", "edit"]
  # Allow Flinkflow to discover installed Flowlet and Pipeline CRs at job startup
  - apiGroups: ["flinkflow.io"]
    resources: ["flowlets", "pipelines"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-role-binding
subjects:
  - kind: ServiceAccount
    name: flink-service-account
roleRef:
  kind: Role
  name: flink-role
  apiGroup: rbac.authorization.k8s.io
