name: CI + Deploy Docs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Sets permissions for the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  packages: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job 1: Build & Test the Java application
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build & Test (Java)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Run Unit Tests
        run: mvn -B test --file pom.xml

      - name: Run Smoke Tests (YAML Validations)
        run: |
          chmod +x deploy/test/smoke-test.sh
          ./deploy/test/smoke-test.sh

      - name: Run Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Log in to the Container registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=true
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags || 'flinkflow:test' }}
          labels: ${{ steps.meta.outputs.labels }}

  # ──────────────────────────────────────────────────────────────────
  # Job 2: Build the Docusaurus documentation site
  # Runs on every push/PR so broken links are caught in PRs too
  # ──────────────────────────────────────────────────────────────────
  build-docs:
    name: Build Docs (Docusaurus)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build Docusaurus site
        working-directory: website
        run: npm run build
        env:
          # Treat broken links as errors during CI (fail fast)
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Pages artifact
        # Only upload artifact on pushes to main (not on PRs)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  # ──────────────────────────────────────────────────────────────────
  # Job 3: Deploy to GitHub Pages
  # Only runs after a successful docs build on the main branch
  # ──────────────────────────────────────────────────────────────────
  deploy-docs:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest

    # Only deploy on pushes to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
